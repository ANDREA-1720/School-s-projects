name: C/C++ CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install compilers (Linux & Windows)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ cmake mingw-w64 zstd zip

      - name: Install CMake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake zstd zip

      - name: Setup environment
        run: |
          mkdir -p build
          for dir in */ ; do
            if [ -f "$dir/main.cpp" ]; then
              echo "Found project: $dir"
              mkdir -p "build/$dir"
            fi
          done
        shell: bash

      - name: Compute directory hashes
        id: hash
        run: |
          echo "Calculating hashes for each project directory..."
          for dir in */ ; do
            if [ -f "$dir/main.cpp" ]; then
              hash=$(tar --exclude='README.md' --exclude='execute.sh' -I "zstd -19 --long=30" -cf - "$dir" | sha512sum | awk '{print $1}')
              echo "hash-$dir=$hash" >> $GITHUB_OUTPUT
            fi
          done
        shell: bash

      - name: Cache builds
        id: cache
        uses: actions/cache@v3
        with:
          path: build
          key: build-${{ matrix.os }}-${{ steps.hash.outputs.hash }}
          restore-keys: |
            build-${{ matrix.os }}-

      - name: Build binaries (Linux & MacOS)
        id: build_binaries
        run: |
          built_files=()
          for dir in */ ; do
            if [ -f "$dir/main.cpp" ]; then
              hash_var="hash-$dir"
              hash_val="${{ steps.hash.outputs[hash_var] }}"
              output_file="build/$dir/${{ matrix.os }}-$(basename $dir)"
              if [ ! -f "$output_file" ] || [ "$(cat "$output_file.sha")" != "$hash_val" ]; then
                echo "Compiling $dir for ${{ matrix.os }}"
                g++ "$dir/main.cpp" -std=c++17 -o "$output_file"
                echo "$hash_val" > "$output_file.sha"
                built_files+=("$output_file")
              else
                echo "$dir is up-to-date, skipping."
              fi
            fi
          done
          echo "${built_files[@]}" > built_files.txt
        shell: bash

      - name: Build binaries (Windows)
        if: runner.os == 'Linux'
        run: |
          built_files=()
          for dir in */ ; do
            if [ -f "$dir/main.cpp" ]; then
              hash_var="hash-$dir"
              hash_val="${{ steps.hash.outputs[hash_var] }}"
              output_file="build/$dir/windows-$(basename $dir).exe"
              if [ ! -f "$output_file" ] || [ "$(cat "$output_file.sha")" != "$hash_val" ]; then
                echo "Compiling $dir for Windows (MinGW)"
                x86_64-w64-mingw32-g++ "$dir/main.cpp" -std=c++17 \
                  -static -static-libgcc -static-libstdc++ \
                  -o "$output_file"
                echo "$hash_val" > "$output_file.sha"
                built_files+=("$output_file")
              else
                echo "$dir is up-to-date, skipping Windows build."
              fi
            fi
          done
          echo "${built_files[@]}" > built_files.txt
        shell: bash

      - name: Upload newly built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: new-binaries-${{ matrix.os }}
          path: built_files.txt

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download newly built artifacts
        uses: actions/download-artifact@v4
        with:
          name: new-binaries-ubuntu-latest
          path: build-new

      - name: Get date
        id: get_date
        run: echo "DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

      - name: Get previous release
        id: prev_release
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1
            });
            if (releases.data.length > 0) {
              return releases.data[0].tag_name;
            } else {
              return '';
            }
          result-encoding: string

      - name: Download previous release artifacts
        if: steps.prev_release.outputs.result != ''
        run: |
          echo "Downloading old release binaries..."
          mkdir -p old_release
          gh release download "${{ steps.prev_release.outputs.result }}" -D old_release

      - name: Pack release files
        run: |
          mkdir -p release
          # merge old and new binaries
          cp -r old_release/* release/ || true
          cp -r build-new/* release/ || true
          # pack each directory into zip (max compression)
          for dir in release/*; do
            if [ -d "$dir" ]; then
              zip -9 -r "${dir}.zip" "$dir"
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.zip
          name: "${{ env.DATE }}-Perciabcosco"
          tag_name: "${{ env.DATE }}-Perciabcosco"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}