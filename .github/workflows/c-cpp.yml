name: C/C++ CI

on:
  push:
    branches: [ "main" ]
    paths:
      - '**.cpp'
      - '**.h'
  workflow_dispatch:
    inputs:
      rebuild_all:
        description: 'Rebuild everything (ignoring cache)'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install compilers (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            lld \
            g++-aarch64-linux-gnu  # sysroot + libs only; clang is the compiler

      - name: Install llvm-mingw for Windows (Linux)
        if: runner.os == 'Linux'
        run: |
          LLVM_MINGW_TAG=20240619
          ARCHIVE=llvm-mingw-${LLVM_MINGW_TAG}-ucrt-ubuntu-20.04-x86_64.tar.xz
          wget -q "https://github.com/mstorsjo/llvm-mingw/releases/download/${LLVM_MINGW_TAG}/${ARCHIVE}"
          tar xf "${ARCHIVE}"
          echo "$PWD/llvm-mingw-${LLVM_MINGW_TAG}-ucrt-ubuntu-20.04-x86_64/bin" >> $GITHUB_PATH

      - name: Install CMake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Restore SHA cache
        if: ${{ inputs.rebuild_all != true }}
        uses: actions/cache/restore@v4
        with:
          path: .cache/prev_shas
          key: shas-${{ matrix.os }}-${{ github.run_id }}
          restore-keys: |
            shas-${{ matrix.os }}-

      - name: Fetch missing SHAs from latest release
        if: ${{ inputs.rebuild_all != true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .cache/prev_shas .cache/zips

          missing=()
          for dir in */ ; do
            if [ -f "$dir/main.cpp" ]; then
              prog=$(basename "$dir")
              [ ! -f ".cache/prev_shas/$prog" ] && missing+=("$prog")
            fi
          done

          if [ ${#missing[@]} -eq 0 ]; then
            echo "All SHAs present in cache — skipping release fetch"
            exit 0
          fi

          echo "Missing SHAs for: ${missing[*]}"
          TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
          [ -z "$TAG" ] && echo "No previous release found" && exit 0

          for prog in "${missing[@]}"; do
            gh release download "$TAG" \
              --pattern "${prog}-binaries-${{ matrix.os }}.zip" \
              --dir .cache/zips 2>/dev/null || true
            zip_file=".cache/zips/${prog}-binaries-${{ matrix.os }}.zip"
            if [ -f "$zip_file" ]; then
              unzip -p "$zip_file" metadata.sha512 > ".cache/prev_shas/$prog" 2>/dev/null && \
                echo "Fetched SHA for: $prog" || true
            else
              echo "No release zip for: $prog (will build fresh)"
            fi
          done
        shell: bash

      - name: Compute source SHAs (tar + SHA-512)
        run: |
          cat > /tmp/compute_sha.py <<'PYEOF'
          import sys, hashlib, tarfile, io
          h = hashlib.sha512()
          with tarfile.open(fileobj=io.BytesIO(sys.stdin.buffer.read())) as tf:
              for m in sorted(tf.getmembers(), key=lambda x: x.name):
                  if m.isfile():
                      h.update(m.name.encode())
                      h.update(tf.extractfile(m).read())
          print(h.hexdigest())
          PYEOF

          mkdir -p .cache/curr_shas
          for dir in */ ; do
            if [ -f "$dir/main.cpp" ]; then
              prog=$(basename "$dir")
              sha=$(tar -cf - \
                --exclude="$dir/README.md" \
                --exclude="$dir/execute.sh" \
                "$dir" | python3 /tmp/compute_sha.py)
              echo "$sha" > ".cache/curr_shas/$prog"
              echo "$prog SHA: ${sha:0:20}..."
            fi
          done
        shell: bash

      - name: Build Linux binaries (amd64 & arm64)
        if: runner.os == 'Linux'
        run: |
          CXXFLAGS="-std=c++17 -O3 -flto -funroll-loops -fomit-frame-pointer -DNDEBUG -s"

          for dir in */ ; do
            if [ -f "$dir/main.cpp" ]; then
              prog=$(basename "$dir")
              curr=$(cat ".cache/curr_shas/$prog" 2>/dev/null || echo "")
              prev=$(cat ".cache/prev_shas/$prog" 2>/dev/null || echo "")

              if [ -n "$curr" ] && [ "$curr" = "$prev" ]; then
                echo "[$prog] Cache hit — skipping Linux builds"
              else
                echo "[$prog] Building linux-amd64 and linux-arm64"
                mkdir -p "build/new/$prog"

                clang++ "$dir/main.cpp" $CXXFLAGS \
                  -fuse-ld=lld \
                  -o "build/new/$prog/linux-amd64-$prog"

                clang++ "$dir/main.cpp" $CXXFLAGS \
                  --target=aarch64-linux-gnu \
                  --sysroot=/usr/aarch64-linux-gnu \
                  -fuse-ld=lld \
                  -o "build/new/$prog/linux-arm64-$prog"

                echo "$curr" > "build/new/$prog/metadata.sha512"
              fi
            fi
          done
        shell: bash

      - name: Build Windows binaries (amd64 & arm64 via llvm-mingw)
        if: runner.os == 'Linux'
        run: |
          CXXFLAGS="-std=c++17 -O3 -flto -funroll-loops -fomit-frame-pointer -DNDEBUG -s -static"

          for dir in */ ; do
            if [ -f "$dir/main.cpp" ]; then
              prog=$(basename "$dir")
              curr=$(cat ".cache/curr_shas/$prog" 2>/dev/null || echo "")
              prev=$(cat ".cache/prev_shas/$prog" 2>/dev/null || echo "")

              if [ -n "$curr" ] && [ "$curr" = "$prev" ]; then
                echo "[$prog] Cache hit — skipping Windows builds"
              else
                echo "[$prog] Building windows-amd64 and windows-arm64"
                mkdir -p "build/new/$prog"

                x86_64-w64-mingw32-clang++ "$dir/main.cpp" $CXXFLAGS \
                  -o "build/new/$prog/windows-amd64-$prog.exe"

                aarch64-w64-mingw32-clang++ "$dir/main.cpp" $CXXFLAGS \
                  -o "build/new/$prog/windows-arm64-$prog.exe"
              fi
            fi
          done
        shell: bash

      - name: Build macOS universal binary (arm64 + x86_64)
        if: runner.os == 'macOS'
        run: |
          for dir in */ ; do
            if [ -f "$dir/main.cpp" ]; then
              prog=$(basename "$dir")
              curr=$(cat ".cache/curr_shas/$prog" 2>/dev/null || echo "")
              prev=$(cat ".cache/prev_shas/$prog" 2>/dev/null || echo "")

              if [ -n "$curr" ] && [ "$curr" = "$prev" ]; then
                echo "[$prog] Cache hit — skipping macOS build"
              else
                echo "[$prog] Building macos-universal (arm64 + x86_64)"
                mkdir -p "build/new/$prog"

                clang++ "$dir/main.cpp" \
                  -std=c++17 -O3 -flto -funroll-loops -fomit-frame-pointer -DNDEBUG \
                  -arch arm64 -arch x86_64 \
                  -o "build/new/$prog/macos-universal-$prog"

                echo "$curr" > "build/new/$prog/metadata.sha512"
              fi
            fi
          done
        shell: bash

      - name: Update SHA cache
        run: cp -r .cache/curr_shas/. .cache/prev_shas/
        shell: bash

      - name: Save SHA cache
        uses: actions/cache/save@v4
        with:
          path: .cache/prev_shas
          key: shas-${{ matrix.os }}-${{ github.run_id }}

      - name: Upload newly built binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}
          path: build/new/
          retention-days: 1
          if-no-files-found: warn
          compression-level: 9

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download newly built artifacts
        uses: actions/download-artifact@v4
        with:
          path: build

      - name: Get date
        run: echo "DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

      - name: Restore zips cache
        if: ${{ inputs.rebuild_all != true }}
        uses: actions/cache/restore@v4
        with:
          path: .cache/old_zips
          key: release-zips-${{ github.run_id }}
          restore-keys: |
            release-zips-

      - name: Fetch missing zips from latest release
        if: ${{ inputs.rebuild_all != true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .cache/old_zips release

          TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
          [ -z "$TAG" ] && echo "No previous release" && exit 0

          for dir in */ ; do
            if [ -f "$dir/main.cpp" ]; then
              prog=$(basename "$dir")
              for os_name in binaries-ubuntu-latest binaries-macos-latest; do
                zip_file=".cache/old_zips/${prog}-${os_name}.zip"
                new_dir="build/$os_name/$prog"
                if [ ! -d "$new_dir" ] && [ ! -f "$zip_file" ]; then
                  echo "Fetching missing zip: ${prog}-${os_name}"
                  gh release download "$TAG" \
                    --pattern "${prog}-${os_name}.zip" \
                    --dir .cache/old_zips 2>/dev/null || \
                    echo "WARNING: No previous zip for ${prog}-${os_name}"
                fi
              done
            fi
          done
        shell: bash

      - name: Assemble release zips
        run: |
          mkdir -p .cache/old_zips release

          for dir in */ ; do
            if [ -f "$dir/main.cpp" ]; then
              prog=$(basename "$dir")
              for os_name in binaries-ubuntu-latest binaries-macos-latest; do
                zip_out="release/${prog}-${os_name}.zip"
                new_dir="build/$os_name/$prog"

                if [ -d "$new_dir" ]; then
                  echo "[$prog / $os_name] Zipping new build"
                  zip -9 -j "$zip_out" "$new_dir"/*
                elif [ -f ".cache/old_zips/${prog}-${os_name}.zip" ]; then
                  echo "[$prog / $os_name] Carrying forward cached zip"
                  cp ".cache/old_zips/${prog}-${os_name}.zip" "$zip_out"
                else
                  echo "WARNING: [$prog / $os_name] No binary available — skipping"
                fi
              done
            fi
          done
        shell: bash

      - name: Update zips cache
        run: cp -r release/*.zip .cache/old_zips
        shell: bash

      - name: Save zips cache
        uses: actions/cache/save@v4
        with:
          path: .cache/old_zips
          key: release-zips-${{ github.run_id }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.zip
          name: "${{ env.DATE }}-Perciabcosco"
          tag_name: "${{ env.DATE }}-Perciabcosco"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
